name: Build APK

on:
  push:
    branches:
      - claude/youtube-shorts-blocker-app-AISBy
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Diagnose Android environment
        run: |
          echo "=== Java version ==="
          java -version
          echo "=== ANDROID_HOME ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "=== SDK directory ==="
          ls "${ANDROID_HOME:-/usr/local/lib/android/sdk}/" 2>/dev/null || echo "SDK dir not found"
          echo "=== Pre-installed platforms ==="
          ls "${ANDROID_HOME:-/usr/local/lib/android/sdk}/platforms/" 2>/dev/null || echo "No platforms"
          echo "=== cmdline-tools ==="
          ls "${ANDROID_HOME:-/usr/local/lib/android/sdk}/cmdline-tools/" 2>/dev/null || echo "No cmdline-tools"

      - name: Setup Android SDK
        run: |
          SDK="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "sdk.dir=$SDK" > local.properties
          SDKMANAGER=$(find "$SDK/cmdline-tools" -name "sdkmanager" -type f 2>/dev/null | head -1)
          echo "sdkmanager at: $SDKMANAGER"
          if [ -n "$SDKMANAGER" ]; then
            yes | "$SDKMANAGER" --licenses 2>&1 | tail -5 || true
            "$SDKMANAGER" "platforms;android-34" "build-tools;34.0.0" 2>&1 && echo "SDK 34 installed" || \
            echo "WARNING: sdkmanager install failed, relying on pre-installed SDK"
          fi
          echo "=== Final platforms ==="
          ls "$SDK/platforms/" 2>/dev/null

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --info

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTShortsBlocker-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-debug
          name: "YT Shorts Blocker v1.0"
          body: |
            ## Installation

            1. Téléchargez **`app-debug.apk`** ci-dessous
            2. Sur Android : **Paramètres → Applications → Installer des applis inconnues** → autoriser votre navigateur
            3. Ouvrez le fichier `.apk` sur votre téléphone et installez
            4. Lancez **YT Shorts Blocker** → activez le service d'accessibilité
          files: app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: true

name: Build APK

on:
  push:
    branches:
      - claude/youtube-shorts-blocker-app-AISBy
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          # Detect SDK location
          SDK="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          echo "Android SDK path: $SDK"
          echo "sdk.dir=$SDK" > local.properties

          # Find sdkmanager (path varies between runner versions)
          SDKMANAGER=$(find "$SDK/cmdline-tools" -name "sdkmanager" -type f 2>/dev/null | head -1)
          echo "sdkmanager: $SDKMANAGER"

          if [ -n "$SDKMANAGER" ]; then
            yes | "$SDKMANAGER" --licenses 2>&1 | tail -3 || true
            "$SDKMANAGER" "platforms;android-35" "build-tools;35.0.0" || true
          fi

          echo "Available platforms:"
          ls "$SDK/platforms/" 2>/dev/null || echo "none"

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: YTShortsBlocker-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-debug
          name: "YT Shorts Blocker v1.0"
          body: |
            ## Installation

            1. Téléchargez **`app-debug.apk`** ci-dessous
            2. Sur Android : **Paramètres → Applications → Installer des applis inconnues** → autoriser votre navigateur/gestionnaire de fichiers
            3. Ouvrez le fichier `.apk` sur votre téléphone et installez
            4. Lancez **YT Shorts Blocker** → appuyez sur le bouton rouge → activez le service dans les paramètres d'accessibilité
          files: app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
          make_latest: true
